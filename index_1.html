<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>투자 계산기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f2f5;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 36px 16px 72px;
    }

    .app { width: 100%; max-width: 560px; }

    h1 {
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      color: #111;
      margin-bottom: 28px;
      letter-spacing: -0.5px;
    }

    /* ── Cards ── */
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 26px 22px;
      margin-bottom: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 13.5px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }

    /* Editable inputs */
    input[type="number"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.8px solid #e2e5ea;
      border-radius: 11px;
      font-size: 16px;
      color: #111;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    /* Read-only computed fields */
    .result-box {
      width: 100%;
      padding: 13px 16px;
      border: 1.8px solid #e8eaed;
      border-radius: 11px;
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
      background: #f5f7fa;
      letter-spacing: -0.2px;
    }

    /* Price row: input + refresh */
    .price-row { position: relative; }
    .price-row input[type="number"] { padding-right: 54px; }

    .refresh-btn {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #3b82f6;
      color: #fff;
      font-size: 19px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      user-select: none;
    }
    .refresh-btn:hover { background: #2563eb; }
    .refresh-btn:active { transform: translateY(-50%) scale(0.93); }
    .refresh-btn .spin-icon { display: inline-block; line-height: 1; }
    .refresh-btn.spinning .spin-icon {
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .price-note {
      font-size: 11.5px;
      margin-top: 6px;
      color: #9aa0ad;
      min-height: 17px;
      transition: color 0.2s;
    }
    .price-note.ok  { color: #16a34a; }
    .price-note.err { color: #dc2626; }
    .price-note.loading { color: #6366f1; }

    /* Source badge */
    .src-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #3b82f6;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 14px;
      text-decoration: none;
    }
    .src-badge:hover { background: #dbeafe; }

    /* ── RYG 배분 ── */
    .ryg-card {
      background: #fff;
      border-radius: 18px;
      padding: 26px 22px;
      margin-bottom: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    .ryg-title {
      text-align: center;
      font-size: 16px;
      font-weight: 800;
      color: #222;
      margin-bottom: 18px;
      letter-spacing: -0.3px;
    }
    .ryg-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .ryg-lbl {
      border-radius: 11px;
      padding: 15px 10px;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
    }
    .lbl-r { background: #dc2626; }
    .lbl-y { background: #d97706; }
    .lbl-g { background: #16a34a; }

    .ryg-val {
      background: #f5f7fa;
      border: 1.8px solid #e8eaed;
      border-radius: 11px;
      padding: 13px 10px;
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      color: #1a1a2e;
    }

    /* ── 총투자금액 ── */
    .total-card {
      background: #16a34a;
      border-radius: 18px;
      padding: 24px 22px;
      box-shadow: 0 3px 12px rgba(22,163,74,0.28);
    }
    .total-label {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.82);
      margin-bottom: 10px;
    }
    .total-val {
      width: 100%;
      padding: 14px 16px;
      border-radius: 11px;
      font-size: 19px;
      font-weight: 800;
      color: #16a34a;
      background: rgba(255,255,255,0.93);
      letter-spacing: -0.3px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: #f0f2f5;
      margin: 6px 0 18px;
    }

    /* formula hint */
    .hint {
      font-size: 11px;
      color: #b0b6c2;
      margin-top: 5px;
    }
  </style>
</head>
<body>
<div class="app">

  <h1>투자 계산기</h1>

  <!-- ① 입력 카드 -->
  <div class="card">
    <div class="field">
      <label>계좌잔고 (억원)</label>
      <input type="number" id="balance" placeholder="계좌잔고를 입력하세요" step="0.01" oninput="calc()"/>
    </div>
    <div class="field">
      <label>Coefficient</label>
      <input type="number" id="coeff" placeholder="계수를 입력하세요" step="0.01" oninput="calc()"/>
    </div>
  </div>

  <!-- ② 계산 카드 -->
  <div class="card">
    <!-- 투자한도 -->
    <div class="field">
      <label>투자한도</label>
      <div class="result-box" id="limitBox">0 원</div>
      <div class="hint">= 계좌잔고 × 계수</div>
    </div>

    <div class="divider"></div>

    <!-- 약정가 -->
    <div class="field">
      <label>약정가 (미니 코스피200 선물)</label>
      <a class="src-badge" href="https://markets.hankyung.com/indices/kospi-future" target="_blank">
        📈 한경코리아마켓
      </a>
      <div class="price-row">
        <input type="number" id="price" value="300.00" step="0.01" oninput="calc()" placeholder="약정가 입력"/>
        <button class="refresh-btn" id="refreshBtn" onclick="fetchPrice()" title="현재가 새로고침">
          <span class="spin-icon">↻</span>
        </button>
      </div>
      <div class="price-note" id="priceNote">↻ 버튼으로 한경코리아마켓 현재가를 불러오세요</div>
    </div>

    <div class="divider"></div>

    <!-- 가능계약수 -->
    <div class="field">
      <label>가능계약수</label>
      <div class="result-box" id="contractsBox">0 계약</div>
      <div class="hint">= 투자한도 ÷ (약정가 × 50,000원)</div>
    </div>
  </div>

  <!-- ③ 계약수 배분 -->
  <div class="ryg-card">
    <div class="ryg-title">계약수 배분</div>
    <div class="ryg-grid">
      <div class="ryg-lbl lbl-r">R</div>
      <div class="ryg-lbl lbl-y">Y</div>
      <div class="ryg-lbl lbl-g">G</div>
      <div class="ryg-val" id="rBox">0</div>
      <div class="ryg-val" id="yBox">0</div>
      <div class="ryg-val" id="gBox">0</div>
    </div>
    <div class="hint" style="text-align:center; margin-top:10px;">R(30%) + Y(30%) + G(40%) = 가능계약수</div>
  </div>

  <!-- ④ 총투자금액 -->
  <div class="total-card">
    <div class="total-label">총투자금액</div>
    <div class="total-val" id="totalBox">0 원</div>
  </div>

</div><!-- /app -->

<script>
  /* ══════════════════════════════
     계산 로직
  ══════════════════════════════ */
  function calc() {
    const balance = parseFloat(document.getElementById('balance').value) || 0;
    const coeff   = parseFloat(document.getElementById('coeff').value)   || 0;
    const price   = parseFloat(document.getElementById('price').value)   || 0;

    // 투자한도 (원)
    const limit = balance * 1e8 * coeff;

    // 가능계약수
    const unitVal  = price * 50000;
    const contracts = unitVal > 0 ? Math.floor(limit / unitVal) : 0;

    // 배분 (R+Y+G = contracts 보장)
    const r = Math.floor(contracts * 0.3);
    const y = Math.floor(contracts * 0.3);
    const g = contracts - r - y;   // 나머지 전부 G → 합계 100% 보장

    // 총투자금액
    const total = price * contracts * 50000;

    document.getElementById('limitBox').textContent     = fmt(limit) + ' 원';
    document.getElementById('contractsBox').textContent = contracts.toLocaleString('ko-KR') + ' 계약';
    document.getElementById('rBox').textContent         = r.toLocaleString('ko-KR');
    document.getElementById('yBox').textContent         = y.toLocaleString('ko-KR');
    document.getElementById('gBox').textContent         = g.toLocaleString('ko-KR');
    document.getElementById('totalBox').textContent     = fmt(total) + ' 원';
  }

  function fmt(n) {
    return Math.round(n).toLocaleString('ko-KR');
  }

  /* ══════════════════════════════
     한경코리아마켓 현재가 조회
     https://markets.hankyung.com/indices/kospi-future
  ══════════════════════════════ */
  async function fetchPrice() {
    const btn  = document.getElementById('refreshBtn');
    const note = document.getElementById('priceNote');

    btn.classList.add('spinning');
    setNote(note, '현재가를 불러오는 중...', 'loading');

    const targetUrl = 'https://markets.hankyung.com/indices/kospi-future';

    // CORS 프록시 목록 (순서대로 시도)
    const PROXIES = [
      u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
      u => `https://thingproxy.freeboard.io/fetch/${u}`,
    ];

    let price = null;
    let usedProxy = '';

    for (const mkProxy of PROXIES) {
      if (price) break;
      try {
        const res = await fetch(mkProxy(targetUrl), {
          signal: AbortSignal.timeout(9000)
        });
        if (!res.ok) continue;
        const html = await res.text();
        price = parseHankyungPrice(html);
        if (price) usedProxy = mkProxy(targetUrl).split('?')[0];
      } catch (e) { /* 다음 프록시 */ }
    }

    if (price && price > 0) {
      document.getElementById('price').value = price.toFixed(2);
      setNote(note, `✓ 현재가 ${price.toFixed(2)} pt 업데이트됨  (${now()})`, 'ok');
      calc();
    } else {
      setNote(note, '⚠ 자동 조회 실패 — 직접 입력해 주세요', 'err');
    }

    btn.classList.remove('spinning');
  }

  /* ─────────────────────────────
     한경 HTML에서 선물 현재가 파싱
     페이지 구조: "825.10" 형태의 숫자
  ───────────────────────────── */
  function parseHankyungPrice(html) {
    // 1) Next.js __NEXT_DATA__ JSON에서 추출
    try {
      const jsonMatch = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
      if (jsonMatch) {
        const json = JSON.parse(jsonMatch[1]);
        // 재귀 탐색으로 'close' 또는 'currentPrice' 키 찾기
        const found = findInObj(json, ['close', 'currentPrice', 'closePrice', 'price', 'last']);
        if (found && found > 50 && found < 9999) return found;
      }
    } catch(e) {}

    // 2) 페이지 텍스트에서 선물 범위(100~2000) 숫자 직접 추출
    //    한경 페이지: 큰 글씨로 "825.10" 같은 형태로 표시
    const patterns = [
      // 코스피200 선물은 보통 100~2000 포인트
      /class="[^"]*price[^"]*"[^>]*>([\d,]+\.[\d]{1,2})</gi,
      />([\d]{3,4}\.[\d]{2})</g,
    ];

    for (const re of patterns) {
      const matches = [...html.matchAll(re)];
      for (const m of matches) {
        const v = parseFloat((m[1] || m[2] || '').replace(/,/g, ''));
        if (v > 100 && v < 2000) return v;
      }
    }

    // 3) 단순 숫자 패턴 (3자리.2자리)
    const m = html.match(/\b(\d{3,4}\.\d{2})\b/);
    if (m) {
      const v = parseFloat(m[1]);
      if (v > 100 && v < 2000) return v;
    }

    return null;
  }

  // 객체/배열을 재귀 탐색하여 지정 키 값 반환
  function findInObj(obj, keys, depth = 0) {
    if (depth > 10 || obj === null || typeof obj !== 'object') return null;
    for (const k of Object.keys(obj)) {
      if (keys.includes(k)) {
        const v = parseFloat(obj[k]);
        if (!isNaN(v) && v > 100 && v < 2000) return v;
      }
      const child = findInObj(obj[k], keys, depth + 1);
      if (child) return child;
    }
    return null;
  }

  function setNote(el, msg, type) {
    el.textContent = msg;
    el.className = 'price-note' + (type ? ' ' + type : '');
  }

  function now() {
    return new Date().toLocaleTimeString('ko-KR');
  }

  // 초기 계산
  calc();
</script>
</body>
</html>
